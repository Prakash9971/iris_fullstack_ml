<!DOCTYPE html>
<html>
<head>
    <title>Iris ML App</title>
</head>
<body style="text-align:center; font-family:Arial">

<h1> Iris Flower Prediction (ML + Flask)</h1>

<form method="post" action="/predict">
    <input name="sepal_length" placeholder="Sepal Length" required><br><br>
    <input name="sepal_width" placeholder="Sepal Width" required><br><br>
    <input name="petal_length" placeholder="Petal Length" required><br><br>
    <input name="petal_width" placeholder="Petal Width" required><br><br>

    <button type="submit">Predict</button>
</form>

{% if prediction %}
<h2> Predicted Flower: {{ prediction }}</h2>
{% endif %}

</body>
</html>
